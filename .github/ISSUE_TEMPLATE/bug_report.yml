name: Bug report
description: Something's broken, flaky, or not behaving as documented.
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: Tiny Bell version
      description: Settings → About shows this.
      placeholder: "0.1.0"
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Other (unsupported, please note in description)
    validations:
      required: true
  - type: dropdown
    id: provider
    attributes:
      label: Provider (if relevant)
      options:
        - Vercel
        - Railway
        - GitHub Actions
        - Multiple / not provider-specific
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected vs. actual
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: |
        Relevant lines from `~/Library/Logs/com.khacvy.tiny-bell/Tiny Bell.log`.
        The redactor strips common secrets but double-check before pasting.
      render: shell
