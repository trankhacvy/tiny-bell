name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> src-tauri/target
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - name: Rust tests
        working-directory: src-tauri
        env:
          VERCEL_CLIENT_ID: ${{ secrets.VERCEL_CLIENT_ID_PROD || '' }}
          RAILWAY_CLIENT_ID: ${{ secrets.RAILWAY_CLIENT_ID_PROD || '' }}
          GITHUB_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID_PROD || '' }}
          TINY_BELL_BROKER_BASE: ${{ secrets.TINY_BELL_BROKER_BASE_PROD || '' }}
        run: cargo test --lib

  publish-tauri:
    needs: test
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "macOS Apple Silicon"
            platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - name: "macOS Intel"
            platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish
        id: tauri
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERCEL_CLIENT_ID: ${{ secrets.VERCEL_CLIENT_ID_PROD }}
          RAILWAY_CLIENT_ID: ${{ secrets.RAILWAY_CLIENT_ID_PROD }}
          GITHUB_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID_PROD }}
          TINY_BELL_BROKER_BASE: ${{ secrets.TINY_BELL_BROKER_BASE_PROD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: v__VERSION__
          releaseBody: |
            ## Tiny Bell __VERSION__

            macOS builds are unsigned — see the [README](https://github.com/trankhacvy/tiny-bell#installing-an-unsigned-build) for how to bypass Gatekeeper on first launch.
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          retryAttempts: 2
          args: ${{ matrix.args }}
          assetNamePattern: "tiny-bell-[version]-[platform]-[arch][ext]"
          includeUpdaterJson: true
          updaterJsonPreferNsis: false

      - name: Release summary
        if: steps.tauri.outputs.releaseHtmlUrl != ''
        run: |
          {
            echo "## Tauri Release"
            echo ""
            echo "- Platform: \`${{ matrix.name }}\`"
            echo "- Version: \`${{ steps.tauri.outputs.appVersion }}\`"
            echo "- Release: ${{ steps.tauri.outputs.releaseHtmlUrl }}"
            echo "- Artifacts: \`${{ steps.tauri.outputs.artifactPaths }}\`"
          } >> "$GITHUB_STEP_SUMMARY"
