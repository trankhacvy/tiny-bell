name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> src-tauri/target
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - name: Rust tests
        working-directory: src-tauri
        env:
          VERCEL_CLIENT_ID: ${{ secrets.VERCEL_CLIENT_ID_PROD || '' }}
          RAILWAY_CLIENT_ID: ${{ secrets.RAILWAY_CLIENT_ID_PROD || '' }}
          GITHUB_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID_PROD || '' }}
          TINY_BELL_BROKER_BASE: ${{ secrets.TINY_BELL_BROKER_BASE_PROD || '' }}
        run: cargo test --lib

  publish-tauri:
    needs: test
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: "macOS Apple Silicon"
            platform: "macos-latest"
            args: "--target aarch64-apple-darwin"
          - name: "macOS Intel"
            platform: "macos-latest"
            args: "--target x86_64-apple-darwin"
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish
        id: tauri
        uses: tauri-apps/tauri-action@action-v0.6.2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERCEL_CLIENT_ID: ${{ secrets.VERCEL_CLIENT_ID_PROD }}
          RAILWAY_CLIENT_ID: ${{ secrets.RAILWAY_CLIENT_ID_PROD }}
          GITHUB_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID_PROD }}
          TINY_BELL_BROKER_BASE: ${{ secrets.TINY_BELL_BROKER_BASE_PROD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v__VERSION__
          releaseName: v__VERSION__
          releaseBody: |
            ## Tiny Bell __VERSION__

            macOS builds are unsigned — see the [README](https://github.com/trankhacvy/tiny-bell#installing-an-unsigned-build) for how to bypass Gatekeeper on first launch.
          releaseDraft: true
          prerelease: false
          generateReleaseNotes: true
          retryAttempts: 2
          args: ${{ matrix.args }}
          assetNamePattern: "tiny-bell-[version]-[platform]-[arch][ext]"
          includeUpdaterJson: true
          updaterJsonPreferNsis: false

      - name: Locate updater signature
        id: sig
        shell: bash
        run: |
          set -euo pipefail
          args='${{ matrix.args }}'
          case "$args" in
            *aarch64-apple-darwin*) platform_key="darwin-aarch64" ;;
            *x86_64-apple-darwin*)  platform_key="darwin-x86_64" ;;
            *) echo "unrecognized target in args: $args" >&2; exit 1 ;;
          esac

          sig_path=$(find src-tauri/target -path '*/release/bundle/macos/*.app.tar.gz.sig' -print -quit || true)
          if [ -z "$sig_path" ]; then
            echo "no .sig produced under src-tauri/target; tree:" >&2
            find src-tauri/target -maxdepth 6 -name '*.sig' -o -name '*.app.tar.gz' 2>/dev/null | head -30 >&2 || true
            exit 1
          fi

          staged="/tmp/updater-${platform_key}.sig"
          cp "$sig_path" "$staged"
          echo "platform_key=${platform_key}" >> "$GITHUB_OUTPUT"
          echo "staged_path=${staged}" >> "$GITHUB_OUTPUT"
          echo "Found signature for ${platform_key}: $sig_path"

      - name: Upload signature artifact
        uses: actions/upload-artifact@v4
        with:
          name: updater-sig-${{ steps.sig.outputs.platform_key }}
          path: ${{ steps.sig.outputs.staged_path }}
          retention-days: 1
          if-no-files-found: error

      - name: Release summary
        if: steps.tauri.outputs.releaseHtmlUrl != ''
        run: |
          {
            echo "## Tauri Release"
            echo ""
            echo "- Platform: \`${{ matrix.name }}\`"
            echo "- Version: \`${{ steps.tauri.outputs.appVersion }}\`"
            echo "- Release: ${{ steps.tauri.outputs.releaseHtmlUrl }}"
            echo "- Artifacts: \`${{ steps.tauri.outputs.artifactPaths }}\`"
          } >> "$GITHUB_STEP_SUMMARY"

  publish-updater:
    needs: publish-tauri
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download signature artifacts
        uses: actions/download-artifact@v4
        with:
          path: sigs
          pattern: updater-sig-*
          merge-multiple: false

      - name: Build and upload latest.json
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          base="https://github.com/trankhacvy/tiny-bell/releases/download/${tag}"

          aarch64_sig=$(find sigs -name 'updater-darwin-aarch64.sig' -print -quit)
          x86_64_sig=$(find sigs -name 'updater-darwin-x86_64.sig' -print -quit)
          if [ -z "${aarch64_sig}" ] || [ -z "${x86_64_sig}" ]; then
            echo "missing one or more signatures" >&2
            find sigs >&2
            exit 1
          fi

          aarch64_value=$(cat "${aarch64_sig}")
          x86_64_value=$(cat "${x86_64_sig}")
          pub_date=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          jq -n \
            --arg version "${version}" \
            --arg pub_date "${pub_date}" \
            --arg aarch64_sig "${aarch64_value}" \
            --arg x86_64_sig "${x86_64_value}" \
            --arg aarch64_url "${base}/tiny-bell-${version}-darwin-aarch64.app.tar.gz" \
            --arg x86_64_url "${base}/tiny-bell-${version}-darwin-x64.app.tar.gz" \
            '{
              version: $version,
              notes: "See the GitHub release for details.",
              pub_date: $pub_date,
              platforms: {
                "darwin-aarch64": { signature: $aarch64_sig, url: $aarch64_url },
                "darwin-x86_64":  { signature: $x86_64_sig,  url: $x86_64_url  }
              }
            }' > latest.json

          cat latest.json
          gh release upload "${tag}" latest.json --repo trankhacvy/tiny-bell --clobber
