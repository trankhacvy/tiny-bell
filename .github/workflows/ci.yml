name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  rust-test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> src-tauri/target
      - name: Rust tests
        working-directory: src-tauri
        env:
          VERCEL_CLIENT_ID: ${{ secrets.VERCEL_CLIENT_ID_DEV || '' }}
          RAILWAY_CLIENT_ID: ${{ secrets.RAILWAY_CLIENT_ID_DEV || '' }}
          GITHUB_CLIENT_ID: ${{ secrets.GH_OAUTH_CLIENT_ID_DEV || '' }}
          TINY_BELL_BROKER_BASE: ${{ secrets.TINY_BELL_BROKER_BASE_DEV || '' }}
        run: cargo test --lib
